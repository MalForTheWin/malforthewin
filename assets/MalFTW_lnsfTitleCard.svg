<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 678 510" width="678" height="510">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,700;0,900&amp;display=swap');
    </style>
  </defs>

  <!-- ── Background ─────────────────────────────── -->
  <rect width="678" height="510" fill="#000429"/>

  <!-- ── Top rule ───────────────────────────────── -->
  <rect x="73" y="25" width="529" height="5" fill="#ffffff"/>

  <!-- ── THE (small, light, above LATE) ─────────── -->
  <text
    x="131" y="68"
    fill="#ffffff"
    font-family="'Barlow', 'Arial Narrow', Arial, sans-serif"
    font-size="20"
    font-weight="300"
    letter-spacing="6"
  >THE</text>

  <!-- ── LATE ───────────────────────────────────── -->
  <text
    x="131" y="135"
    fill="#ffffff"
    font-family="'Barlow', Arial, sans-serif"
    font-size="82"
    font-weight="400"
    textLength="442"
    lengthAdjust="spacingAndGlyphs"
  >LATE</text>

  <!-- ── NIGHT ──────────────────────────────────── -->
  <text
    x="131" y="221"
    fill="#ffffff"
    font-family="'Barlow', Arial, sans-serif"
    font-size="82"
    font-weight="400"
    textLength="442"
    lengthAdjust="spacingAndGlyphs"
  >NIGHT</text>

  <!-- ── SPACE ──────────────────────────────────── -->
  <text
    x="131" y="309"
    fill="#c1dbff"
    font-family="'Barlow', Arial, sans-serif"
    font-size="84"
    font-weight="900"
    textLength="442"
    lengthAdjust="spacingAndGlyphs"
  >SPACE</text>

  <!-- ── FLIGHT ─────────────────────────────────── -->
  <text
    x="131" y="401"
    fill="#c1dbff"
    font-family="'Barlow', Arial, sans-serif"
    font-size="84"
    font-weight="900"
    textLength="442"
    lengthAdjust="spacingAndGlyphs"
  >FLIGHT</text>

  <!-- ── SHOW (rotated 90° CW, right edge) ─────── -->
  <text
    transform="rotate(90, 596, 315)"
    x="596" y="315"
    text-anchor="middle"
    fill="#ffffff"
    font-family="'Barlow', 'Arial Narrow', Arial, sans-serif"
    font-size="22"
    font-weight="300"
    textLength="168"
    lengthAdjust="spacingAndGlyphs"
  >SHOW</text>

  <!-- ── Bottom rule ────────────────────────────── -->
  <rect x="73" y="425" width="529" height="5" fill="#ffffff"/>

  <!-- ── WITH ───────────────────────────────────── -->
  <text
    x="80" y="473"
    fill="#ffffff"
    font-family="'Barlow', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="4"
  >WITH</text>

  <!-- ── MALFORTHEWIN ───────────────────────────── -->
  <text
    x="196" y="473"
    fill="#1265e5"
    font-family="'Barlow', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    textLength="402"
    lengthAdjust="spacingAndGlyphs"
  >MALFORTHEWIN</text>

</svg>
